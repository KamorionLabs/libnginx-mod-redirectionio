name: Build ARM64 Debian packages

on:
  workflow_dispatch:
    inputs:
      module_version:
        description: 'Module version (e.g. 3.1.0-kamorion1)'
        required: true
        default: '3.1.0-kamorion1'
      libredirectionio_ref:
        description: 'libredirectionio git ref'
        required: true
        default: 'master'
      create_release:
        description: 'Create GitHub Release with .deb assets'
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: bullseye
            debian_image: debian:11-slim
          - distro: bookworm
            debian_image: debian:12-slim
          - distro: trixie
            debian_image: debian:13-slim
    container:
      image: ${{ matrix.debian_image }}

    steps:
      - name: Enable source repositories
        run: |
          if [ -f /etc/apt/sources.list.d/debian.sources ]; then
            sed -i 's/^Types: deb$/Types: deb deb-src/' /etc/apt/sources.list.d/debian.sources
          else
            sed -i -E 's/^deb (http.+)$/deb \1\ndeb-src \1/' /etc/apt/sources.list
          fi
          apt-get update

      - name: Install build dependencies
        run: |
          apt-get install -y --no-install-recommends \
            dpkg-dev build-essential \
            autoconf automake libtool pkg-config \
            ca-certificates curl wget tar git xz-utils \
            nginx
          apt-get build-dep -y nginx

      - name: Checkout module
        uses: actions/checkout@v4

      - name: Install Rust (via rustup)
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain stable --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install nfpm
        run: |
          NFPM_VERSION=2.38.0
          curl -sfL "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_Linux_arm64.tar.gz" \
            | tar -xz -C /usr/local/bin nfpm

      - name: Checkout libredirectionio
        uses: actions/checkout@v4
        with:
          repository: redirectionio/libredirectionio
          ref: ${{ inputs.libredirectionio_ref }}
          path: libredirectionio-src

      - name: Build and install libredirectionio
        working-directory: libredirectionio-src
        run: |
          autoreconf -vi
          ./configure --prefix=/usr/local
          make -j$(nproc)
          make install
          ldconfig

      - name: Download Debian nginx source
        run: |
          mkdir -p nginx-build && cd nginx-build
          apt source nginx
          ls -d nginx-*/ > ../nginx-src-dir.txt
          cat ../nginx-src-dir.txt

      - name: Build nginx module against Debian nginx source
        run: |
          set -eux
          MODULE_DIR="$GITHUB_WORKSPACE"
          NGINX_SRC="$GITHUB_WORKSPACE/nginx-build/$(cat nginx-src-dir.txt)"
          NGINX_ARGS=$(nginx -V 2>&1 | grep -oP 'configure arguments: \K.*')
          NGINX_ARGS=$(echo "$NGINX_ARGS" | sed -E 's/--add-(dynamic-)?module=[^ ]*//g')
          NGINX_VERSION=$(nginx -v 2>&1 | grep -oP 'nginx/\K[0-9.]+')
          cd "$NGINX_SRC"
          eval ./configure "$NGINX_ARGS" --add-dynamic-module="$MODULE_DIR"
          make -j$(nproc) modules
          cp objs/ngx_http_redirectionio_module.so "$GITHUB_WORKSPACE/"
          echo "NGINX_VERSION=$NGINX_VERSION" >> "$GITHUB_ENV"

      - name: Prepare load_module config
        run: |
          mkdir -p pkg/etc/nginx/modules-enabled
          echo 'load_module /usr/lib/nginx/modules/ngx_http_redirectionio_module.so;' \
            > pkg/etc/nginx/modules-enabled/50-mod-http-redirectionio.conf

      - name: Package .deb
        env:
          VERSION: ${{ inputs.module_version }}
          DISTRO: ${{ matrix.distro }}
        run: |
          mkdir -p dist
          cat > /tmp/nfpm.yaml <<EOF
          name: libnginx-mod-http-redirectionio
          arch: arm64
          platform: linux
          version: ${VERSION}
          release: 1~${DISTRO}
          section: httpd
          priority: optional
          maintainer: Kamorion <infra@kamorion.com>
          description: |
            Nginx module for redirection.io (ARM64 build by Kamorion)
            Built against Debian nginx ${NGINX_VERSION} source for binary compatibility.
            Upstream: https://github.com/redirectionio/libnginx-mod-redirectionio
          homepage: https://github.com/KamorionLabs/libnginx-mod-redirectionio
          license: MIT
          depends:
            - nginx (>= ${NGINX_VERSION})
          contents:
            - src: ngx_http_redirectionio_module.so
              dst: /usr/lib/nginx/modules/ngx_http_redirectionio_module.so
            - src: pkg/etc/nginx/modules-enabled/50-mod-http-redirectionio.conf
              dst: /etc/nginx/modules-enabled/50-mod-http-redirectionio.conf
          EOF
          nfpm package \
            --packager deb \
            --config /tmp/nfpm.yaml \
            --target "dist/libnginx-mod-http-redirectionio_${VERSION}-1~${DISTRO}_arm64.deb"

      - name: Smoke test (dpkg -i + nginx -t)
        run: |
          dpkg -i dist/*.deb
          nginx -t

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.distro }}-arm64
          path: dist/*.deb
          if-no-files-found: error

  release:
    needs: build
    if: inputs.create_release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.module_version }}
        run: |
          gh release create "v${VERSION}" \
            --repo "${{ github.repository }}" \
            --title "v${VERSION}" \
            --notes "ARM64 builds of libnginx-mod-redirectionio ${VERSION} for Debian bullseye, bookworm and trixie. Built against Debian nginx sources for binary compatibility with stock nginx packages." \
            dist/*.deb
